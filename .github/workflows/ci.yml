name: CI Demo Pipeline

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 1. FORMATTING TEST
      - name: Run Formatting Test (Black)
        run: black --check src/

      # 2. LINT TEST
      - name: Run Lint Test (Flake8)
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # 3. UNIT TEST
      - name: Run Unit Test (Pytest)
        run: python -m pytest tests/

      # 4. BUILD TEST
      - name: Run Build Test (Simulasi)
        run: |
          echo "Memulai proses build..."
          python -m zipapp src/ -o app.pyz
          echo "Build berhasil! Artifak app.pyz tercipta."